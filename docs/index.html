<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Document</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <style>
    /* 为固定底部备案条预留空间，避免遮挡内容 */
    .content {
      padding-bottom: 60px !important;
    }
  </style>
</head>
<body>
  <div id="app">Please wait...</div>
  <script>
    window.$docsify = {
      name: 'MINALZ',
      repo: 'https://github.com/minalz/docsify-cli.git',
      loadNavbar: true,
      loadSidebar: true,
      coverpage: true,
	  autoHeader: true,
	  maxLevel: 4,
      subMaxLevel: 3,
	  alias: {
        '/.*/_navbar.md': '/_navbar.md',
		'/main/.*/_sidebar.md': '/_sidebar.md',
      },
	  search: {
        placeholder: '搜索',
        noData: '找不到结果!',
        depth: 3
      },
      // 显示文档更新日期
      formatUpdated: '{YYYY}/{MM}/{DD} {HH}:{mm}',
      plugins: [
        function(hook, vm) {
          const footer = [
            '<footer style="position:fixed;bottom:0;left:0;width:100%;background:#fff;border-top:1px solid #eee;z-index:999;">',
            '<div style="width:300px;margin:0 auto;padding:10px 0;text-align:center;">',
            '<a target="_blank" href="https://beian.miit.gov.cn/" style="display:inline-block;text-decoration:none;height:20px;line-height:20px;"><p style="float:left;height:20px;line-height:20px;margin:0px 0px 0px 5px;color:#939393;font-size:12px;">ICP备案/许可证号:皖ICP备2024061459号</p></a>',
            '<a target="_blank" href="http://www.beian.gov.cn/portal/registerSystemInfo?recordcode=34010202601556" style="display:inline-block;text-decoration:none;height:20px;line-height:20px;"><img src="备案图标.png" style="float:left;height:14px;margin-top:3px;"/><p style="float:left;height:20px;line-height:20px;margin:0px 0px 0px 5px;color:#939393;font-size:12px;">皖公网安备 34010202601556号</p></a>',
            '</div>',
            '</footer>',
          ].join('');
          hook.beforeEach(function (html) {
            const url = 'https://github.com/minalz/docsify-cli/tree/master/docs/' + vm.route.file;
            // var editHtml = '[📝 EDIT DOCUMENT](' + url + ')\n'
            const editHtml_end = '[🖊 Edit Document](' + url + ')\n';
            return html
                    + '\n----\n'
                    + '> Last Modified {docsify-updated} '
                    + editHtml_end
          });
          hook.afterEach(function (html) {
            return html + footer;
          });
        }
      ],
    }
    window.$docsify.customPageFooter = {
      copyrightOwnerName: 'Sujaykumar Hublikar',
      copyrightOwnerLink: 'https://github.com/sujaykumarh',
    }
  </script>
  <script src="//unpkg.com/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="//unpkg.com/prismjs/components/prism-bash.js"></script>
  <script src="//unpkg.com/prismjs/components/prism-java.js"></script>
  <script src="//unpkg.com/prismjs/components/prism-sql.js"></script>
  <script src="//unpkg.com/docsify-copy-code"></script>
</body>

</html>
